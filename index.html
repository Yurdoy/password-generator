<html>
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&     display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="container">
      <h1 class="first-header">Generate a</h1>
      <h1 class="second-header">random password</h1>
      <h3>Never use an insecure password again.</h3>
      <div class="btn-input-switch">
        <button id="generate-pass-btn" onclick="generatePassword()">
          Generate password
        </button>
        <div class="range-switch">
          <p id="set-char">Characters Qty</p>
          <input
            id="input-range"
            type="range"
            value="15"
            min="15"
            max="100"
            oninput="this.nextElementSibling.value = this.value"
          />
          <output>15</output>
        </div>
        <div class="toggle-block">
          <p class="toggle-title-up">Symbols</p>
          <label class="switch">
            <input type="checkbox" id="symbols-and-numbers" />
            <span class="slider round"><span class="text">&</span></span>
          </label>
          <p class="toggle-title">Numbers</p>
        </div>
      </div>
      <hr />
      <div class="pass-block">
        <div class="pass-field">
          <p class="left"></p>
        </div>
        <div class="pass-field">
          <p class="right"></p>
        </div>
      </div>
      <button id="copy-btn">Copy</button>
      <script src="index.js"></script>
    </div>
  </body>
</html>
